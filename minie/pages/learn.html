<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MIRS — Learn</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../assets/css/styles.css" />
    <script defer src="../assets/js/app.js"></script>
  </head>
  <body>
    <nav class="navbar">
      <div class="navbar-brand">
        <div class="navbar-brand-dot"></div>
        MIRS
      </div>
      <div class="navbar-tabs">
        <a class="nav-tab" href="assessment.html">📋 Assessment</a>
        <a class="nav-tab" href="dashboard.html">📊 My Score</a>
        <a class="nav-tab" href="coach.html">🤖 AI Coach</a>
        <a class="nav-tab active" href="learn.html">📚 Learn</a>
        <a class="nav-tab" href="#" onclick="logout(); return false;">🚪 Log out</a>
      </div>
    </nav>

    <div class="app-wrapper">
      <div class="page-inner">
        <div class="xp-bar">
          <div class="xp-pill xp" id="xpDisplay">⚡ 120 XP</div>
          <div class="xp-pill streak">🔥 3-day streak</div>
          <div style="flex: 1"></div>
          <div style="font-size: 12px; color: var(--text-muted)" id="learnDone">2 of 9 done</div>
        </div>

        <div class="learn-progress">
          <div class="learn-progress-row">
            <span>Overall progress</span>
            <span id="learnPct">22%</span>
          </div>
          <div class="bar-track">
            <div class="bar-fill" id="learnBar" style="background: var(--green); width: 22%"></div>
          </div>
        </div>

        <div id="learnDynamicMount"></div>
      </div>
    </div>

    <div class="modal-overlay" id="videoModal" onclick="closeOnBg(event)">
      <div class="video-modal-box">
        <div class="video-modal-head">
          <div class="video-modal-icon" id="vmIcon">📹</div>
          <div style="flex: 1; min-width: 0">
            <div class="video-modal-week" id="vmWeek">Week 1 · Basics</div>
            <div class="video-modal-title" id="vmTitle">Loading…</div>
          </div>
          <button class="modal-close" onclick="closeVideo()">✕</button>
        </div>

        <div class="video-modal-body">
          <div class="video-wrapper">
            <iframe
              id="ytPlayer"
              src=""
              title="Lesson video"
              frameborder="0"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
              allowfullscreen
            ></iframe>
          </div>

          <div class="video-meta-row">
            <span id="vmDuration">⏱ 6 min</span>
            <span id="vmXpTag">+50 XP on completion</span>
          </div>

          <div class="vtab-bar">
            <button class="vtab active" id="tab-takeaways" onclick="switchVTab('takeaways')">📝 Key takeaways</button>
            <button class="vtab" id="tab-quiz" onclick="switchVTab('quiz')">✏️ Quick quiz</button>
          </div>

          <div class="vtab-content active" id="vt-takeaways">
            <div id="takeawaysList"></div>

            <div class="ask-artha-box" id="askArthaBox">
              <div class="ask-artha-label">Still confused? Ask Artha 🤖</div>
              <div class="ask-artha-chips" id="askArthaChips"></div>
            </div>
          </div>

          <div class="vtab-content" id="vt-quiz">
            <div id="videoQuizContent"></div>
          </div>
        </div>

        <div class="video-modal-footer">
          <div class="vid-footer-left" id="vidQuizStatus">Watch the video, then take the quiz to earn XP</div>
          <button class="vid-complete-btn" id="vidCompleteBtn" onclick="markVideoComplete()" disabled>
            Mark as complete ✓
          </button>
        </div>
      </div>
    </div>
  </body>
</html>
