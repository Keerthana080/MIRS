<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — MIRS</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../assets/css/styles.css" />
  </head>
  <body class="auth-page">
    <div class="noise-overlay"></div>
    <div class="auth-bg">
      <div class="auth-blob one"></div>
      <div class="auth-blob two"></div>
      <div class="auth-blob three"></div>
    </div>

    <main class="auth-card">
      <header class="auth-header">
        <div class="auth-logo" style="--delay: 1">
          <div class="navbar-brand-dot"></div>
          MIRS
        </div>
        <h1 class="auth-title" style="animation: fieldIn 0.8s ease both; animation-delay: 0.5s;">Welcome back</h1>
        <p class="auth-sub" style="animation: fieldIn 0.8s ease both; animation-delay: 0.6s;">Please enter your details to sign in</p>
      </header>

      <form action="assessment.html">
        <div class="field" style="--delay: 3">
          <input type="email" id="email" placeholder=" " required />
          <label for="email">Email address</label>
        </div>

        <div class="field" style="--delay: 4; margin-bottom: 32px;">
          <input type="password" id="password" placeholder=" " required />
          <label for="password">Password</label>
          <a href="#" style="position: absolute; right: 4px; bottom: -20px; font-size: 11px; color: var(--green); text-decoration: none; font-weight: 600; transition: opacity 0.2s;">Forgot?</a>
        </div>

        <button type="submit" class="btn-primary btn-shimmer" style="--delay: 5; margin-top: 12px; width: 100%;">
          Log in
        </button>
      </form>

      <footer class="auth-footer" style="--delay: 6">
        Don’t have an account? <a href="signup.html" class="auth-link">Sign up</a>
      </footer>
    </main>
  </body>
</html>
